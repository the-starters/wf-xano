<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wf-xano · brand opportunities example</title>
    <style>
      body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; background: #f5f5f3; color: #23281f; }
      .wrap { max-width: 720px; margin: 40px auto; padding: 0 20px; }
      h1 { font-size: 20px; }
      .toolbar { display: flex; gap: 12px; align-items: center; margin: 16px 0; }
      select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 8px; }
      .opportunity-card { display: block; text-decoration: none; color: inherit; background: #fff; border: 1px solid #e4e4df; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
      .opportunity-card h3 { margin: 0 0 4px; font-size: 16px; }
      .opportunity-card p { margin: 0 0 8px; color: #66705e; }
      .meta { font-size: 13px; color: #8a917f; }
      .pill { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
      .pill-active { background: #dff0d8; color: #2f6b2f; }
      .pill-closed { background: #eee; color: #777; }
      .pill-review { background: #fdf1d6; color: #8a6d1c; }
      .pager { display: flex; gap: 6px; margin-top: 16px; }
      .pager button { border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
      .pager button.is-active { background: #434b43; color: #fff; border-color: #434b43; }
      .pager button.is-disabled { opacity: 0.4; pointer-events: none; }
      .state { padding: 16px; color: #8a917f; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Mock backend: no real Xano/Memberstack needed for this standalone demo. -->
      <script>
        const ALL = Array.from({ length: 23 }, (_, i) => ({
          id: 100 + i,
          title: ['Brand Designer', 'Growth Marketer', 'Shopify Dev', 'Copywriter'][i % 4] + ' #' + (i + 1),
          description: 'Sample opportunity row rendered by wf-xano from a mocked Xano list endpoint.',
          project_type: ['One Time', 'Ongoing Part Time', 'Full Time'][i % 3],
          budget: [2500, 5000, 120000][i % 3],
          budget_frequency: ['project', 'month', 'year'][i % 3],
          published_at: '2026-06-' + String((i % 28) + 1).padStart(2, '0') + 'T00:00:00Z',
          status: ['Active', 'Active', 'Closed', 'Pending Review'][i % 4],
        }))
        window.fetch = function (url, opts) {
          const body = JSON.parse((opts && opts.body) || '{}')
          let items = ALL
          if (body.status) items = items.filter((o) => o.status === body.status)
          const per = body.per_page || 20
          const page = body.page || 1
          const start = (page - 1) * per
          const paged = items.slice(start, start + per)
          return Promise.resolve({
            ok: true,
            status: 200,
            json: () =>
              Promise.resolve({
                items: paged,
                itemsTotal: items.length,
                curPage: page,
                pageTotal: Math.max(1, Math.ceil(items.length / per)),
              }),
          })
        }
        window.WfXanoConfig = { xanoBase: 'https://demo.xano.io', preAuth: false, debug: true }
      </script>

      <!-- Header lives OUTSIDE the list wrapper via the instance key -->
      <h1>My opportunities <small>(<span wf-xano-element="total" wf-xano-instance="opps">0</span>)</small></h1>
      <p class="meta">Showing <span wf-xano-element="count-from" wf-xano-instance="opps">0</span>–<span wf-xano-element="count-to" wf-xano-instance="opps">0</span> of <span wf-xano-element="total" wf-xano-instance="opps">0</span></p>

      <div wf-xano-element="wrapper" wf-xano-instance="opps" wf-xano-url-sync="true" wf-xano-source="opp30:brand/opportunities/list" wf-xano-auth="none" wf-xano-per-page="8" wf-xano-page-window="5">
        <div class="toolbar">
          <label>Status
            <select wf-xano-filter="status">
              <option value="">All</option>
              <option value="Active">Active</option>
              <option value="Closed">Closed</option>
              <option value="Pending Review">Pending Review</option>
            </select>
          </label>
        </div>

        <a wf-xano-element="template" class="opportunity-card" wf-xano-link="id" wf-xano-link-prefix="/opportunities-details---brand-view?opp=">
          <h3 wf-xano-bind="title"></h3>
          <p wf-xano-bind="description"></p>
          <div class="meta">
            <span wf-xano-bind="project_type"></span> ·
            $<span wf-xano-bind="budget"></span>/<span wf-xano-bind="budget_frequency"></span> ·
            <time wf-xano-bind="published_at" wf-xano-format="date"></time>
            <span class="pill pill-active" wf-xano-if="status === 'Active'" wf-xano-display="inline-block">Live</span>
            <span class="pill pill-closed" wf-xano-if="status === 'Closed'" wf-xano-display="inline-block">Closed</span>
            <span class="pill pill-review" wf-xano-if="status === 'Pending Review'" wf-xano-display="inline-block">In review</span>
          </div>
        </a>

        <div class="state" wf-xano-element="empty" style="display:none">No opportunities yet.</div>
        <div class="state" wf-xano-element="loader">Loading…</div>
        <div class="state" wf-xano-element="error" style="display:none">Something went wrong.</div>

        <div class="pager">
          <button wf-xano-element="page-prev">‹ Prev</button>
          <button wf-xano-element="page-number">1</button>
          <button wf-xano-element="page-next">Next ›</button>
        </div>
      </div>
    </div>

    <script src="../wf-xano.js"></script>
  </body>
</html>
