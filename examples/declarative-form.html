<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wf-xano · declarative form example</title>
    <style>
      body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; background: #f5f5f3; color: #23281f; }
      main { max-width: 560px; margin: 48px auto; padding: 0 20px; }
      form { display: grid; gap: 14px; padding: 22px; background: #fff; border: 1px solid #e4e4df; border-radius: 12px; }
      label { display: grid; gap: 5px; }
      input, textarea, button { font: inherit; padding: 9px 11px; border: 1px solid #bbb; border-radius: 8px; }
      button { cursor: pointer; background: #263322; color: #fff; }
      .error { color: #a12622; min-height: 1.4em; margin: 0; }
      .status { color: #66705e; }
      .is-wf-xano-form-dirty { border-color: #cf9b2f; }
      .is-wf-xano-form-success { border-color: #397c43; }
      .is-wf-xano-form-error { border-color: #a12622; }
    </style>
  </head>
  <body>
    <main>
      <h1>Declarative profile form</h1>
      <p>This example replaces <code>fetch</code> with a local mock; it does not write to Xano.</p>

      <div wf-xano-element="wrapper" wf-xano-instance="profile-editor">
        <form wf-xano-form="profile" wf-xano-form-source="demo:profile/update"
          wf-xano-form-method="PATCH" wf-xano-form-auth="none">
          <label>Display name
            <input wf-xano-field="display_name" value="Ada" required />
          </label>
          <p class="error" wf-xano-error-for="display_name"></p>
          <label>Bio
            <textarea wf-xano-field="bio">Builder</textarea>
          </label>
          <p class="error" wf-xano-error-for="form"></p>
          <button type="submit">Save profile</button>
          <button type="reset">Reset</button>
        </form>
        <p class="status">Status: <strong wf-xano-state="form.profile.status">idle</strong></p>
      </div>
    </main>

    <script>
      var attempts = 0
      window.fetch = function (_url, options) {
        attempts += 1
        var body = JSON.parse(options.body)
        document.body.dataset.lastPayload = JSON.stringify(body)
        return new Promise(function (resolve) {
          setTimeout(function () {
            var invalid = String(body.display_name).toLowerCase() === 'taken'
            resolve({
              ok: !invalid,
              status: invalid ? 422 : 200,
              json: function () {
                return Promise.resolve(invalid
                  ? { errors: { display_name: 'That display name is already taken.' }, ignored_secret: 'not projected' }
                  : { profile: { id: 1, display_name: body.display_name } })
              },
            })
          }, 120)
        })
      }
      window.WfXanoConfig = { xanoBase: 'https://demo.xano.io', preAuth: false, debug: true }
    </script>
    <script src="../wf-xano.js"></script>
  </body>
</html>
